name: blog-image-gen
region: sfo
services:
- name: generator-api
  github:
    repo: alston808/blog-image-gen  # Replace with your repo
    branch: main
  instance_size_slug: basic-xs # $5/month tier
  instance_count: 1
  build_command: pip install -r requirements.txt
  run_command: uvicorn app:app --host 0.0.0.0 --port 8080
  http_port: 8080
  health_check:
    path: /health
  env:
    - key: DIGITALOCEAN_API_KEY
      scope: RUN_TIME
      value: ${DIGITALOCEAN_API_KEY} # Add this secret in DO Control Panel
